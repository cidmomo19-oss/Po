<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akses Konten Video</title>
    
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background: #f6f8fa; 
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, transparent 70%);
            font-family: 'Inter', sans-serif; color: #0f172a; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            overflow: hidden; 
        }

        .core-wrapper {
            width: 90%; max-width: 400px; background: #ffffff; padding: 35px 28px 25px; 
            border-radius: 28px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.02);
            border: 1px solid rgba(226, 232, 240, 0.8); text-align: center;
            transform: translateY(-20px); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .core-wrapper.typing { transform: translateY(-80px); }

        .badge-icon {
            width: 52px; height: 52px; background: #0f172a; border-radius: 16px; 
            display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px; 
            box-shadow: 0 10px 20px -5px rgba(15, 23, 42, 0.3); transition: all 0.3s ease;
        }

        .badge-icon svg { width: 24px; height: 24px; color: #ffffff; }

        h1 { font-family: 'Outfit', sans-serif; margin: 0 0 8px 0; font-size: 24px; font-weight: 700; color: #0f172a; letter-spacing: -0.5px; }
        p.sub-text { margin: 0 0 24px 0; font-size: 14px; color: #64748b; line-height: 1.5; }
        
        .magic-box {
            background: #f1f5f9; border-radius: 99px; padding: 6px 6px 6px 20px; 
            display: flex; align-items: center; border: 2px solid transparent; transition: all 0.3s ease;
        }
        .magic-box:focus-within { background: #ffffff; border-color: #cbd5e1; box-shadow: 0 0 0 4px rgba(226, 232, 240, 0.5); }

        .txt-node { 
            flex: 1; border: none; background: transparent; font-size: 16px; 
            font-family: 'Inter', sans-serif; color: #0f172a; font-weight: 600; padding: 10px 0; width: 100%; 
            text-transform: uppercase; letter-spacing: 1px;
        }
        .txt-node::placeholder { color: #94a3b8; font-weight: 400; text-transform: none; letter-spacing: normal; }
        
        .btn-go { 
            background: #0f172a; color: #ffffff; border: none; border-radius: 50%; width: 40px; height: 40px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; flex-shrink: 0; 
        }
        .btn-go:hover { background: #334155; }
        .btn-go:active { transform: scale(0.92); }
        .btn-go svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .btn-go:disabled { background: #cbd5e1; cursor: not-allowed; }

        .alert-node { color: #ef4444; margin-top: 16px; font-size: 13px; font-weight: 500; opacity: 0; display: none; }
        .alert-node.show { opacity: 1; display: block; animation: fadeIn 0.3s; }

        /* WIDGET WA */
        .divider { margin: 24px 0 16px; height: 1px; background: #e2e8f0; width: 100%; }

        .wa-inline-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; padding: 12px 16px; background: #f0fdf4; border: 1px solid #bbf7d0; 
            border-radius: 16px; text-decoration: none; color: #166534; 
            transition: all 0.2s ease;
        }
        .wa-inline-btn:hover { background: #dcfce7; }
        .wa-inline-btn:active { transform: scale(0.98); }
        .wa-icon-bg { background: #22c55e; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;}
        .wa-icon-bg svg { width: 18px; height: 18px; fill: #ffffff; }
        
        .wa-text-wrap { text-align: left; display: flex; flex-direction: column; line-height: 1.3; }
        .wa-text-main { font-size: 14px; font-weight: 700; color: #166534; }
        .wa-text-sub { font-size: 11px; font-weight: 500; color: #15803d; opacity: 0.85; }

        /* WIDGET STATS (NO EMOJI) */
        .stats-wrap {
            margin-top: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #f8fafc;
            padding: 8px 16px;
            border-radius: 99px;
            border: 1px solid #f1f5f9;
        }
        .stats-wrap svg { width: 16px; height: 16px; stroke: #64748b; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .stats-wrap span { font-size: 13px; color: #64748b; font-weight: 500; }
        .stats-wrap strong { color: #0f172a; font-weight: 700; font-family: 'Outfit', sans-serif; font-size: 14px; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body>

<div id="core-app" class="core-wrapper">
    <div class="badge-icon" id="main-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
    </div>

    <h1 id="main-title">Akses Konten</h1>
    <p class="sub-text" id="main-desc">Masukkan kata kunci (4 Huruf) yang ada di dalam video untuk melanjutkan.</p>
    
    <div class="magic-box" id="box-wrap">
        <input type="text" id="k_node" class="txt-node" placeholder="Contoh: YTBO" spellcheck="false" autocomplete="off" maxlength="4">
        <button id="trig_btn" class="btn-go">
            <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </button>
    </div>

    <div id="err_msg" class="alert-node">Kata kunci tidak ditemukan.</div>

    <div class="divider"></div>
    <a href="https://whatsapp.com/channel/0029Vb7ppPyCBtxEWJ5f1I0V" target="_blank" class="wa-inline-btn">
        <div class="wa-icon-bg">
            <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        </div>
        <div class="wa-text-wrap">
            <span class="wa-text-main">Join Saluran WhatsApp</span>
            <span class="wa-text-sub">Jaga-jaga kalo akun ke-banned</span>
        </div>
    </a>

    <!-- WIDGET STATISTIK BARU (Tanpa Emoji) -->
    <div class="stats-wrap">
        <svg viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <span><strong id="view-counter">...</strong> tautan berhasil diakses</span>
    </div>

</div>

<script>
    const appNode = document.getElementById("core-app");
    const inputNode = document.getElementById("k_node");
    const btnNode = document.getElementById("trig_btn");
    const errNode = document.getElementById("err_msg");
    const boxWrap = document.getElementById("box-wrap");

    // Ambil Data View secara otomatis pas halaman diload
    window.addEventListener("DOMContentLoaded", async () => {
        try {
            const res = await fetch("/api/stats");
            if (res.ok) {
                const data = await res.json();
                document.getElementById("view-counter").innerText = data.total.toLocaleString('id-ID');
            }
        } catch (e) {
            document.getElementById("view-counter").innerText = "-";
        }
    });

    window.addEventListener("pageshow", () => {
        if(inputNode) inputNode.value = ""; 
        if(btnNode) btnNode.disabled = false;
        if(errNode) errNode.classList.remove('show');
    });

    async function prosesCek() {
        const val = inputNode.value.trim().toUpperCase();
        if (!val || val.length !== 4) return tampilError("Kata kunci harus 4 huruf.");
        
        errNode.classList.remove('show');
        btnNode.disabled = true;
        
        try {
            const req = await fetch(`/api/check/${encodeURIComponent(val)}?_=${Date.now()}`);
            if (req.ok) {
                sessionStorage.setItem('_vx', val);
                inputNode.value = ""; 
                btnNode.disabled = false; 
                
                let newTab = window.open("verify.html", "_blank");
                if(!newTab || newTab.closed || typeof newTab.closed === 'undefined') {
                    window.location.href = "verify.html";
                }
            } else {
                tampilError("Kata kunci salah. Periksa kembali video.");
            }
        } catch (e) {
            tampilError("Gangguan jaringan.");
        }
    }

    function tampilError(txt) {
        errNode.innerText = txt;
        errNode.classList.add('show');
        boxWrap.classList.add('shake');
        setTimeout(() => boxWrap.classList.remove('shake'), 400);
        btnNode.disabled = false;
        inputNode.focus();
    }

    if(btnNode) btnNode.onclick = prosesCek;
    if(inputNode) {
        inputNode.addEventListener("keypress", (e) => { if (e.key === "Enter") prosesCek(); });
        inputNode.addEventListener('focus', () => appNode.classList.add('typing'));
        inputNode.addEventListener('blur', () => appNode.classList.remove('typing'));
    }
</script>
</body>
</html>
